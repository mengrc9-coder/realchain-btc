<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RealChain-BTC V2 Final</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="home">
    <section class="hero">
      <div class="badge">RealChain-BTC V2 Final</div>
      <h1>局域网双节点区块链实验网络</h1>
      <p>V2 是 V1 的累计版本：保留钱包、签名交易、UTXO、独立挖矿，并新增 Node A / Node B 自动互联、交易广播、区块广播和自动同步。</p>
      <div class="actions">
        <a class="button primary" href="wallet.html">打开钱包页面</a>
        <a class="button" href="network.html">打开网络监控页面</a>
      </div>
    </section>
    <section class="grid two">
      <div class="card">
        <h2>wallet.html</h2>
        <p>只负责创建 keystore、导入 keystore、解锁钱包、查看余额和发起转账。私钥只在当前电脑浏览器内临时解锁。</p>
      </div>
      <div class="card">
        <h2>network.html</h2>
        <p>只负责观察 Node A 和 Node B 的连接、区块高度、tip hash、mempool 和同步状态。</p>
      </div>
    </section>
  </main>
</body>
</html>
